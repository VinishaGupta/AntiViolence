<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <style>

    body {
    font-family: 'Poppins', sans-serif; 
    background-color: rgb(249, 235, 250); 
    color: #333;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 600px;
    margin: 50px auto;
    padding: 30px;
    background-color: white; 
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

h1 {
    text-align: center;
    color: #555;
    margin-bottom: 20px;
}

p {
    text-align: center;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.donation-options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.donation-options label {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
    cursor: pointer;
    transition: background-color 0.3s, border-color 0.3s;
}

.donation-options label:hover {
    background-color: rgb(155, 112, 183);
    border-color: rgb(155, 112, 183);
    color: white;
}

input[type="radio"] {
    display: none;
}

input[type="radio"]:checked + label {
    background-color: rgb(155, 112, 183);
    border-color: rgb(155, 112, 183);
    color: white;
}

.custom-amount input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    width: 100%;
    box-sizing: border-box;
}

input[type="text"], input[type="email"] {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    width: 100%;
    box-sizing: border-box;
}

input[type="submit"].btn {
    padding: 12px;
    background-color: rgb(155, 112, 183);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
}

input[type="submit"].btn:hover {
    background-color: rgb(155, 112, 183);
}
    </style>
</head>

<body>
    <div class="container">
        <h1>Donate</h1>
        <p>Your support helps us achieve our goals. Please choose an amount or enter a custom donation below:</p>
        <form id="donation-form">
            <div class="donation-options">
                <label>
                    <input type="radio" name="amount" value="10" checked>
                    &#8377;10
                </label>
                <label>
                    <input type="radio" name="amount" value="20">
                    &#8377;20
                </label>
                <label>
                    <input type="radio" name="amount" value="50">
                    &#8377;50
                </label>
                <label>
                    <input type="radio" name="amount" value="100">
                    &#8377;100
                </label>
                <label>
                    <input type="radio" name="amount" value="custom">
                    Custom
                </label>
            </div>
            <div class="custom-amount">
                <input type="number" name="customAmount" placeholder="Custom amount" min="1" style="display: none;">
            </div>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Your email">
            </div>
            <div class="form-group">
                <input type="submit" value="Donate" class="btn">
            </div>
        </form>
    </div>

    <script>
        // JavaScript to toggle custom amount field
        document.querySelectorAll('input[name="amount"]').forEach(function (input) {
            input.addEventListener('change', function () {
                if (this.value === 'custom') {
                    document.querySelector('.custom-amount input').style.display = 'block';
                } else {
                    document.querySelector('.custom-amount input').style.display = 'none';
                }
            });
        });
    </script>
</body>

</html>
